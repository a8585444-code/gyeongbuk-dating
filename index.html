<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/favicon.png">
    <meta name="viewport" content="width=device-width, maximum-scale=1, user-scalable=yes">
    <title>in_your_season 1:1 소개팅 지원서</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Apple SD Gothic Neo', '맑은 고딕', sans-serif; background: #f5f0f4; color: #333; min-height: 100vh; }
        .top-banner { background: linear-gradient(135deg, #d63384, #9b2c6b); color: white; text-align: center; padding: 28px 20px 24px; }
        .top-banner h1 { font-size: 1.5rem; font-weight: 700; }
        .top-banner p { margin-top: 6px; font-size: 0.88rem; opacity: 0.88; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px 14px 70px; }
        .intro-box { background: white; border-radius: 14px; padding: 20px; margin-bottom: 14px; font-size: 0.85rem; line-height: 1.75; color: #555; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .intro-box .orange { color: #e8820c; font-weight: 600; }
        .intro-box .pink { color: #d63384; font-weight: 600; }
        .section { background: white; border-radius: 14px; padding: 22px 20px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .section-title { font-size: 0.78rem; font-weight: 700; color: #d63384; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 18px; padding-bottom: 10px; border-bottom: 1px solid #f0e0eb; }
        .field { margin-bottom: 20px; }
        label.field-label { display: block; font-size: 0.9rem; font-weight: 700; color: #333; margin-bottom: 5px; }
        .field-label .req { color: #d63384; margin-left: 2px; }
        .field-desc { font-size: 0.8rem; color: #888; margin-bottom: 8px; line-height: 1.5; }
        .radio-row { display: flex; flex-wrap: wrap; gap: 8px; }
        .radio-row label { display: flex; align-items: center; gap: 6px; padding: 9px 16px; border: 1.5px solid #e5d8e5; border-radius: 22px; font-size: 0.88rem; font-weight: 500; cursor: pointer; transition: all 0.15s; background: #fdfcfd; }
        .radio-row input[type="radio"] { display: none; }
        .radio-row label.selected { border-color: #d63384; background: #fdf0f6; color: #d63384; font-weight: 700; }
        input[type="text"], select, textarea { width: 100%; padding: 11px 13px; border: 1.5px solid #e5d8e5; border-radius: 9px; font-size: 0.95rem; font-family: inherit; color: #333; background: #fdfcfd; outline: none; }
        input[type="text"]:focus, select:focus, textarea:focus { border-color: #d63384; background: #fff; }
        .file-upload-area { border: 2px dashed #ddd; border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; position: relative; background: #fdfcfd; }
        .file-upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
        .file-preview-list img { width: 90px; height: 120px; object-fit: cover; border-radius: 8px; margin-top: 10px; border: 1.5px solid #eee; }
        .submit-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #d63384, #9b2c6b); color: white; border: none; border-radius: 12px; font-size: 1.05rem; font-weight: 700; cursor: pointer; margin-top: 20px; }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.show { display: flex; }
        .modal { background: white; border-radius: 18px; padding: 30px; max-width: 360px; width: 100%; text-align: center; }
        .ar-tag { display:inline-block; padding:6px 14px; border-radius:20px; font-size:13px; cursor:pointer; border:1.5px solid #d1d5db; background:#fff; margin: 3px; }
        .ar-tag.selected { background:#7c3aed; color:#fff; border-color:#7c3aed; }
    </style>
</head>
<body>

<div class="top-banner">
    <h1>in_your_season</h1>
    <p>1:1 프라이빗 매칭 지원서</p>
</div>

<div class="container">
    <div class="intro-box">
        <p class="orange">본인의 매력을 솔직하게 작성해주세요.</p>
        <p class="pink">작성하신 사진은 수파베이스 스토리지에 안전하게 보관됩니다.</p>
    </div>

    <form id="applyForm">
        <div class="section">
            <div class="section-title">기본 정보</div>
            <div class="field">
                <label class="field-label">이름 <span class="req">*</span></label>
                <input type="text" name="name" required placeholder="실명을 입력해주세요">
            </div>
            <div class="field">
                <label class="field-label">성별 <span class="req">*</span></label>
                <div class="radio-row" id="genderGroup">
                    <label onclick="selectRadio(this,'gender')"><input type="radio" name="gender" value="남" required> 남</label>
                    <label onclick="selectRadio(this,'gender')"><input type="radio" name="gender" value="여"> 여</label>
                </div>
            </div>
            <div class="field">
                <label class="field-label">닉네임 <span class="req">*</span></label>
                <input type="text" name="nickname" required maxlength="7" placeholder="활동 닉네임">
            </div>
            <div class="field">
                <label class="field-label">출생년도 <span class="req">*</span></label>
                <select name="birthYear" required>
                    <option value="">선택</option>
                    <script>
                        for(let i=86; i<=103; i++) {
                            let v = i > 99 ? String(i-100).padStart(2,'0') : i;
                            document.write(`<option value="${v}">${v}</option>`);
                        }
                    </script>
                </select> 년생
            </div>
            <div class="field">
                <label class="field-label">휴대폰 번호 <span class="req">*</span></label>
                <input type="text" name="phoneNumber" required placeholder="01012345678" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
            </div>
            <div class="field">
                <label class="field-label">거주 지역 <span class="req">*</span></label>
                <input type="text" name="region" required placeholder="예) 대구 수성구, 경북 구미">
            </div>
        </div>

        <div class="section">
            <div class="section-title">사진</div>
            <div class="field">
                <label class="field-label">프로필 사진 첨부 <span class="req">*</span></label>
                <div class="file-upload-area">
                    <input type="file" id="photoInput" accept="image/*" required>
                    <div style="font-size: 24px;">📷</div>
                    <p id="fileStatus">클릭하여 사진을 선택해 주세요</p>
                </div>
                <div id="photoPreview" class="file-preview-list"></div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">매력 포인트</div>
            <div class="field">
                <label class="field-label">직업 <span class="req">*</span></label>
                <input type="text" name="job" required placeholder="구체적으로 작성 (예: 대기업 사무직, 간호사)">
            </div>
            <div class="field">
                <label class="field-label">키 (cm) <span class="req">*</span></label>
                <input type="text" name="height" required placeholder="숫자만 입력" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
            </div>
            <div class="field">
                <label class="field-label">MBTI <span class="req">*</span></label>
                <input type="text" name="mbti" required placeholder="예) ENFP" style="text-transform:uppercase">
            </div>
            <div class="field">
                <label class="field-label">나의 성격 <span class="req">*</span></label>
                <input type="text" name="personality" required placeholder="예) 다정하고 차분한 편">
            </div>
            <div class="field">
                <label class="field-label">취미/특기 <span class="req">*</span></label>
                <input type="text" name="hobby" required placeholder="예) 테니스, 맛집 탐방">
            </div>
            <div class="field">
                <label class="field-label">종교 <span class="req">*</span></label>
                <select name="religion" required>
                    <option value="무교">무교</option>
                    <option value="기독교">기독교</option>
                    <option value="불교">불교</option>
                    <option value="천주교">천주교</option>
                    <option value="기타">기타</option>
                </select>
            </div>
            <div class="field">
                <label class="field-label">음주 유무 <span class="req">*</span></label>
                <input type="text" name="drinking" required placeholder="예) 주 1회, 거의 안 마심">
            </div>
            <div class="field">
                <label class="field-label">흡연 유무 <span class="req">*</span></label>
                <select name="smoking" required>
                    <option value="비흡연">비흡연</option>
                    <option value="흡연">흡연</option>
                    <option value="전자담배">전자담배</option>
                </select>
            </div>
        </div>

        <div class="section">
            <div class="section-title">이상형 정보</div>
            <div class="field">
                <label class="field-label">나의 이상형 <span class="req">*</span></label>
                <textarea name="idealType" required placeholder="외모, 가치관 등 구체적으로 작성"></textarea>
            </div>
            <div class="field">
                <label class="field-label">자기 소개 <span class="req">*</span></label>
                <textarea name="selfIntroduction" required placeholder="본인의 매력을 어필해 주세요 (100자 내외)"></textarea>
            </div>
            <div class="field">
                <label class="field-label">기피 종교 (태그 클릭)</label>
                <div id="avoidTags">
                    <span class="ar-tag" onclick="this.classList.toggle('selected')">기독교</span>
                    <span class="ar-tag" onclick="this.classList.toggle('selected')">불교</span>
                    <span class="ar-tag" onclick="this.classList.toggle('selected')">천주교</span>
                    <span class="ar-tag" onclick="this.classList.toggle('selected')">무교만 선호</span>
                </div>
                <input type="hidden" name="avoidReligion" id="avoidReligionHidden">
            </div>
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">지원서 제출하기</button>
    </form>
</div>

<div class="modal-overlay" id="successModal">
    <div class="modal">
        <div style="font-size: 40px; margin-bottom: 15px;">🎉</div>
        <h2>지원서 제출 완료!</h2>
        <p style="margin-top: 10px; color: #666; font-size: 0.9rem;">
            소중한 정보가 안전하게 접수되었습니다.<br>매칭이 시작되면 연락드릴게요!
        </p>
        <button onclick="location.reload()" style="margin-top: 20px; padding: 10px 30px; background: #d63384; color: white; border: none; border-radius: 20px; font-weight: 700;">확인</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://teeutkxfzxdsaqdvwrwt.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_3VeTRnYQJ1wl50YYQwodCA_nuTZ1WM-';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 라디오 선택 효과
    function selectRadio(labelEl, groupName) {
        labelEl.parentNode.querySelectorAll('label').forEach(l => l.classList.remove('selected'));
        labelEl.classList.add('selected');
        labelEl.querySelector('input').checked = true;
    }

    // 사진 미리보기
    const photoInput = document.getElementById('photoInput');
    photoInput.addEventListener('change', function() {
        const preview = document.getElementById('photoPreview');
        const status = document.getElementById('fileStatus');
        preview.innerHTML = '';
        if (this.files[0]) {
            status.innerText = "사진이 선택되었습니다: " + this.files[0].name;
            const img = document.createElement('img');
            img.src = URL.createObjectURL(this.files[0]);
            preview.appendChild(img);
        }
    });

    // 폼 제출
    const form = document.getElementById('applyForm');
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.textContent = '사진 업로드 및 전송 중...';

        try {
            // 1. 기피 종교 태그 정리
            const avoidTags = [];
            document.querySelectorAll('#avoidTags .ar-tag.selected').forEach(t => avoidTags.push(t.innerText));
            document.getElementById('avoidReligionHidden').value = avoidTags.join(', ');

            // 2. 사진 업로드 (Storage)
            const file = photoInput.files[0];
            let photoUrl = "";
            if (file) {
                const fileName = `${Date.now()}_${file.name}`;
                const { data: uploadData, error: uploadError } = await _supabase.storage
                    .from('profile_photos')
                    .upload(fileName, file);
                
                if (uploadError) throw uploadError;

                const { data: urlData } = _supabase.storage
                    .from('profile_photos')
                    .getPublicUrl(fileName);
                photoUrl = urlData.publicUrl;
            }

            // 3. 데이터 준비 및 전송 (DB)
            const formData = new FormData(form);
            const finalData = Object.fromEntries(formData.entries());
            finalData.photo_url = photoUrl;
            finalData.status = "대기"; // 기본 상태

            const { error: dbError } = await _supabase
                .from('members')
                .insert([finalData]);

            if (dbError) throw dbError;

            document.getElementById('successModal').classList.add('show');
        } catch (error) {
            alert('제출 중 오류가 발생했습니다: ' + error.message);
            console.error(error);
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = '지원서 제출하기';
        }
    });
</script>

</body>
</html>
