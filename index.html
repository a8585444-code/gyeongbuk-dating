<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/favicon.png">
    <meta name="viewport" content="width=device-width, maximum-scale=1, user-scalable=yes">
    <title>in_your_season 1:1 소개팅 지원서</title>
    <style>
        /* [스타일은 대표님의 원본과 동일하게 유지합니다] */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Apple SD Gothic Neo', '맑은 고딕', sans-serif; background: #f5f0f4; color: #333; min-height: 100vh; }
        .top-banner { background: linear-gradient(135deg, #d63384, #9b2c6b); color: white; text-align: center; padding: 28px 20px 24px; }
        .top-banner h1 { font-size: 1.5rem; font-weight: 700; }
        .top-banner p { margin-top: 6px; font-size: 0.88rem; opacity: 0.88; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px 14px 70px; }
        .intro-box { background: white; border-radius: 14px; padding: 20px; margin-bottom: 14px; font-size: 0.85rem; line-height: 1.75; color: #555; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .intro-box .orange { color: #e8820c; font-weight: 600; }
        .intro-box .pink { color: #d63384; font-weight: 600; }
        .intro-box h3 { font-size: 0.9rem; color: #333; margin: 12px 0 6px; }
        .intro-box ul { padding-left: 16px; }
        .intro-box li { margin-bottom: 4px; }
        .section { background: white; border-radius: 14px; padding: 22px 20px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .section-title { font-size: 0.78rem; font-weight: 700; color: #d63384; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 18px; padding-bottom: 10px; border-bottom: 1px solid #f0e0eb; }
        .field { margin-bottom: 20px; }
        label.field-label { display: block; font-size: 0.9rem; font-weight: 700; color: #333; margin-bottom: 5px; }
        .field-label .req { color: #d63384; margin-left: 2px; }
        .field-desc { font-size: 0.8rem; color: #888; margin-bottom: 8px; line-height: 1.5; }
        .badge-public { display: inline-block; background: #e8f5e9; color: #2e7d32; font-size: 0.72rem; font-weight: 700; padding: 2px 9px; border-radius: 20px; border: 1px solid #a5d6a7; margin-bottom: 5px; }
        .private-box { background: #f7f7f7; border: 1.5px solid #ddd; border-left: 3px solid #aaa; border-radius: 8px; padding: 16px 16px 4px 16px; margin-top: 12px; }
        .private-box-header { font-size: 0.75rem; font-weight: 700; color: #888; margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid #e5e5e5; }
        input[type="text"], select, textarea { width: 100%; padding: 11px 13px; border: 1.5px solid #e5d8e5; border-radius: 9px; font-size: 0.95rem; font-family: inherit; color: #333; background: #fdfcfd; outline: none; transition: border-color 0.2s; appearance: none; }
        input[type="text"]:focus, select:focus, textarea:focus { border-color: #d63384; background: #fff; }
        .radio-row { display: flex; flex-wrap: wrap; gap: 8px; }
        .radio-row label { display: flex; align-items: center; gap: 6px; padding: 9px 16px; border: 1.5px solid #e5d8e5; border-radius: 22px; font-size: 0.88rem; font-weight: 500; cursor: pointer; transition: all 0.15s; background: #fdfcfd; }
        .radio-row input[type="radio"] { display: none; }
        .radio-row label.selected { border-color: #d63384; background: #fdf0f6; color: #d63384; font-weight: 700; }
        .file-upload-area { border: 2px dashed #ddd; border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.2s; background: #fdfcfd; position: relative; }
        .file-upload-area:hover { border-color: #d63384; background: #fdf5f9; }
        .file-upload-area input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
        .file-upload-area .upload-icon { font-size: 2rem; }
        .file-upload-area p { margin-top: 8px; font-size: 0.83rem; color: #999; }
        .file-preview-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
        .file-preview-item { position: relative; width: 90px; height: 90px; }
        .file-preview-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; border: 1.5px solid #eee; }
        .agree-item { border: 1.5px solid #e5d8e5; border-radius: 10px; padding: 14px; margin-bottom: 10px; }
        .agree-label { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; color: #333; }
        .submit-btn { width: 100%; padding: 16px; background: linear-gradient(135deg, #d63384, #9b2c6b); color: white; border: none; border-radius: 12px; font-size: 1.05rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s; letter-spacing: -0.3px; }
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.show { display: flex; }
        .modal { background: white; border-radius: 18px; padding: 36px 26px; max-width: 360px; width: 100%; text-align: center; box-shadow: 0 10px 50px rgba(0,0,0,0.2); }
        .ar-tag { display:inline-block; padding:6px 14px; border-radius:20px; font-size:13px; cursor:pointer; border:1.5px solid #d1d5db; background:#fff; color:#374151; transition:all .15s; margin-bottom: 6px; }
        .ar-tag.selected { background:#7c3aed; color:#fff; border-color:#7c3aed; }
    </style>
</head>
<body>

<div class="top-banner">
    <h1>in_your_season</h1>
    <p>경상도(대구/경북/경남) 거주자 대상</p>
</div>

<div class="container">
    <div class="intro-box">
        <p class="orange">작성 예시를 참고하여 가능한 구체적으로 작성해주셔야 매칭 확률이 높아집니다.</p>
        <h3>진행 절차</h3>
        <ul>
            <li>지원서 작성 → 프로필 카드 제작</li>
            <li class="pink">상호 수락 시 매칭비 결제 후 연락처 전달</li>
        </ul>
    </div>

    <form id="applyForm">
        <div class="section">
            <div class="agree-item">
                <div class="agree-text"><span class="req">*</span> 안내 내용을 모두 읽고 확인하였습니다.</div>
                <label class="agree-label"><input type="checkbox" id="confirmRead" required> 확인</label>
            </div>
        </div>

        <div class="section">
            <div class="section-title">기본 정보</div>
            <div class="field">
                <label class="field-label">이름 <span class="req">*</span></label>
                <input type="text" name="name" required maxlength="20" placeholder="실명을 입력해주세요">
            </div>
            <div class="field">
                <label class="field-label">성별 <span class="req">*</span></label>
                <div class="radio-row" id="genderGroup">
                    <label onclick="selectRadio(this,'gender','남')"><input type="radio" name="gender" value="남" required> 남</label>
                    <label onclick="selectRadio(this,'gender','여')"><input type="radio" name="gender" value="여"> 여</label>
                </div>
            </div>
            <div class="field">
                <label class="field-label">닉네임 <span class="req">*</span></label>
                <input type="text" name="nickname" required maxlength="7" placeholder="활동 닉네임 (최대 7자)">
            </div>
            <div class="field">
                <label class="field-label">출생년도 <span class="req">*</span></label>
                <select name="birthYear" required style="width:100px;">
                    <option value="">선택</option>
                    <script>
                        for(let i=86; i<=103; i++) {
                            let val = i > 99 ? String(i-100).padStart(2,'0') : i;
                            document.write(`<option value="${val}">${val}</option>`);
                        }
                    </script>
                </select> 년생
            </div>
            <div class="field">
                <label class="field-label">휴대폰 번호 <span class="req">*</span></label>
                <input type="text" name="phoneNumber" required maxlength="11" placeholder="01012345678" oninput="this.value = this.value.replace(/[^0-9]/g, '');">
            </div>
            <div class="field">
                <label class="field-label">지역 <span class="req">*</span></label>
                <input type="text" name="region" required placeholder="예) 대구, 경주, 구미">
            </div>
        </div>

        <div class="section">
            <div class="section-title">사진</div>
            <div class="field">
                <label class="field-label">프로필 사진 첨부 <span class="req">*</span></label>
                <div class="field-desc"><span class="pink">선택하신 사진이 수파베이스에 안전하게 저장됩니다.</span></div>
                <div class="file-upload-area">
                    <input type="file" id="photoInput" accept="image/*" required>
                    <div class="upload-icon">📷</div>
                    <p>클릭하여 사진 선택 (필수)</p>
                </div>
                <div class="file-preview-list" id="photoPreview"></div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">직업 및 추가 정보</div>
            <div class="field">
                <label class="field-label">직업 <span class="req">*</span></label>
                <input type="text" name="job" required placeholder="구체적인 직업 기재">
            </div>
            <div class="field">
                <label class="field-label">키 <span class="req">*</span></label>
                <input type="text" name="height" required placeholder="숫자만 (cm)">
            </div>
            <div class="field">
                <label class="field-label">MBTI <span class="req">*</span></label>
                <input type="text" name="mbti" required placeholder="예) ENFP" style="text-transform:uppercase">
            </div>
            <div class="field">
                <label class="field-label">자기 소개 <span class="req">*</span></label>
                <textarea name="selfIntroduction" required maxlength="100" placeholder="본인을 잘 나타내는 소개글을 적어주세요."></textarea>
            </div>
            <input type="hidden" name="avoidReligion" id="avoidReligionHidden">
        </div>

        <button type="submit" class="submit-btn" id="submitBtn">지원서 제출하기</button>
    </form>
</div>

<div class="modal-overlay" id="successModal">
    <div class="modal">
        <div class="icon">🎉</div>
        <h2>제출 완료!</h2>
        <p>사진과 데이터가 모두 정상적으로 접수되었습니다.</p>
        <button class="modal-btn" onclick="location.reload()">확인</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    const SUPABASE_URL = 'https://teeutkxfzxdsaqdvwrwt.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_3VeTRnYQJ1wl50YYQwodCA_nuTZ1WM-';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // [기존 라디오/태그 로직 유지]
    function selectRadio(labelEl, name, value) {
        labelEl.parentNode.querySelectorAll('label').forEach(l => l.classList.remove('selected'));
        labelEl.classList.add('selected');
        labelEl.querySelector('input').checked = true;
    }

    // 사진 미리보기
    const photoInput = document.getElementById('photoInput');
    photoInput.addEventListener('change', function(e) {
        const preview = document.getElementById('photoPreview');
        preview.innerHTML = '';
        if (this.files[0]) {
            const img = document.createElement('img');
            img.src = URL.createObjectURL(this.files[0]);
            img.style.width = "90px"; img.style.height = "90px"; img.style.objectFit = "cover"; img.style.borderRadius = "8px";
            preview.appendChild(img);
        }
    });

    // 폼 제출 로직
    const form = document.getElementById('applyForm');
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.textContent = '사진 업로드 및 전송 중...';

        try {
            // 1. 사진 스토리지 업로드
            const file = photoInput.files[0];
            let photoUrl = "";
            if (file) {
                const fileExt = file.name.split('.').pop();
                const fileName = `${Date.now()}.${fileExt}`;
                const { data: uploadData, error: uploadError } = await _supabase.storage
                    .from('profile_photos')
                    .upload(fileName, file);
                
                if (uploadError) throw uploadError;

                const { data: urlData } = _supabase.storage
                    .from('profile_photos')
                    .getPublicUrl(fileName);
                photoUrl = urlData.publicUrl;
            }

            // 2. 데이터 준비
            const formData = new FormData(form);
            const finalData = Object.fromEntries(formData.entries());
            finalData.photo_url = photoUrl; // 사진 주소 추가!
            finalData.status = "대기"; // 기본 상태 설정

            // 3. DB 저장
            const { error: dbError } = await _supabase
                .from('members')
                .insert([finalData]);

            if (dbError) throw dbError;

            document.getElementById('successModal').classList.add('show');
        } catch (error) {
            console.error(error);
            alert('오류가 발생했습니다: ' + error.message);
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = '지원서 제출하기';
        }
    });
</script>
</body>
</html>
