<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대구/경북 파인드썸 관리</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', -apple-system, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        
        .container { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); padding: 48px 40px; max-width: 480px; width: 100%; position: relative; margin-bottom: 20px; }
        h1 { font-size: 24px; color: #1a1a2e; margin-bottom: 8px; text-align: center; }
        .subtitle { color: #666; font-size: 14px; text-align: center; margin-bottom: 36px; }
        
        .menu { display: flex; flex-direction: column; gap: 16px; }
        .menu button { display: flex; align-items: center; gap: 16px; padding: 20px 24px; border: 1px solid #e5e7eb; border-radius: 12px; text-decoration: none; color: #1a1a2e; transition: all 0.2s; background: white; cursor: pointer; width: 100%; text-align: left; }
        .menu button:hover { border-color: #7c3aed; background: #faf5ff; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(124,58,237,0.1); }
        .menu-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
        .menu-icon.pink { background: #fce7f3; }
        .menu-icon.blue { background: #dbeafe; }
        .menu-icon.purple { background: #ede9fe; }
        .menu-icon.new-icon { background: #fef2f2; font-size: 13px; font-weight: 900; color: #dc2626; letter-spacing: -0.5px; }
        .new-count { font-size: 13px; color: #dc2626; font-weight: 700; margin-left: 4px; }
        .menu-text h2 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .menu-text p { font-size: 13px; color: #888; }
        
        .table-container { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); padding: 20px; max-width: 1000px; width: 100%; overflow-x: auto; display: none; }
        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .table-header h2 { font-size: 18px; color: #333; }
        table { width: 100%; border-collapse: collapse; white-space: nowrap; font-size: 13px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #f8fafc; color: #475569; font-weight: 600; }
        tr:hover { background: #f1f5f9; }
        .loading { text-align: center; font-size: 14px; color: #7c3aed; font-weight: bold; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>대구/경북 파인드썸 관리</h1>
        <p class="subtitle">1:1 소개팅 회원 통합 관리 (Supabase 연동)</p>
        
        <div class="loading" id="loadingIndicator">데이터를 동기화하고 있습니다... ⏳</div>
        <p id="monthlyStats" style="text-align:center;font-size:14px;color:#059669;font-weight:600;margin-bottom:20px;">통계 불러오는 중...</p>

        <div class="menu">
            <button onclick="filterMembers('all')">
                <div class="menu-icon new-icon">ALL</div>
                <div class="menu-text">
                    <h2>전체회원 명단 조회 <span class="new-count" id="pendingCount"></span></h2>
                    <p>접수된 모든 회원 명단 확인</p>
                </div>
            </button>
            <button onclick="filterMembers('여')">
                <div class="menu-icon pink">&#9792;</div>
                <div class="menu-text">
                    <h2>여자 회원 모아보기</h2>
                    <p>여자 회원 명단만 필터링하여 조회</p>
                </div>
            </button>
            <button onclick="filterMembers('남')">
                <div class="menu-icon blue">&#9794;</div>
                <div class="menu-text">
                    <h2>남자 회원 모아보기</h2>
                    <p>남자 회원 명단만 필터링하여 조회</p>
                </div>
            </button>
            <button onclick="loadData()">
                <div class="menu-icon purple">&#128260;</div>
                <div class="menu-text">
                    <h2>최신 데이터 새로고침</h2>
                    <p>DB에서 최신 지원자 정보 가져오기</p>
                </div>
            </button>
        </div>
    </div>

    <div class="table-container" id="tableContainer">
        <div class="table-header">
            <h2 id="tableTitle">전체 회원 명단</h2>
            <span style="font-size:12px; color:#888;" id="rowCount">0명</span>
        </div>
        <table>
            <thead><tr id="headerRow"></tr></thead>
            <tbody id="memberData"></tbody>
        </table>
    </div>

    <script>
        // 🚨 아래 키 값을 아까 복사해둔 긴 키로 꼭 바꿔주세요! (URL은 제가 입력해두었습니다)
        const SUPABASE_URL = 'https://teeutkxfzxdsaqdvwrwt.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_3VeTRnYQJ1wl50YYQwodCA_nuTZ1WM-';
        
        let allMembers = [];

        // 💡 수파베이스용 한글 번역 사전 (Timestamp 대신 created_at 사용)
        const translate = {
            "id": "회원번호", "created_at": "접수일시", "status": "상태",
            "name": "이름", "gender": "성별", "nickname": "닉네임",
            "birthYear": "출생연도", "phoneNumber": "연락처", "region": "거주지역",
            "job": "직업", "jobCategory": "직군", "jobOrganizationName": "직장명",
            "height": "키", "doubleEyelid": "쌍꺼풀", "bodyType": "체형",
            "personality": "성격", "mbti": "MBTI", "hobby": "취미",
            "smoking": "흡연여부", "drinking": "음주여부", "religion": "종교",
            "idealType": "이상형", "importantCriteria": "중요조건", "preferredAgeRange": "선호연령",
            "preferredHeightMin": "선호키(최소)", "avoidReligion": "기피종교", "avoidType": "기피유형",
            "selfIntroduction": "자기소개", "continueMatchingYn": "추가매칭여부"
        };

        // 데이터 불러오기 함수 (수파베이스 GET 요청)
        async function loadData() {
            document.getElementById('loadingIndicator').style.display = 'block';
            
            try {
                // order=created_at.desc 로 최신순 정렬해서 가져오기
                const response = await fetch(`${SUPABASE_URL}/rest/v1/members?select=*&order=created_at.desc`, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                });

                if (!response.ok) throw new Error('데이터 로드 실패');
                
                allMembers = await response.json();
                
                const currentMonth = new Date().toISOString().substring(0, 7);
                const thisMonthCount = allMembers.filter(m => m.created_at && m.created_at.startsWith(currentMonth)).length;
                
                document.getElementById('monthlyStats').textContent = `이번 달 신규 회원 : ${thisMonthCount}명 (총 ${allMembers.length}명)`;
                
                // 대기 상태인 회원 수 표시
                const pendingCount = allMembers.filter(m => m.status === '대기').length;
                document.getElementById('pendingCount').textContent = `(대기 ${pendingCount}명)`;

            } catch (error) {
                alert('데이터를 불러오지 못했습니다. API 키를 확인해주세요.');
                console.error(error);
            } finally {
                document.getElementById('loadingIndicator').style.display = 'none';
            }
        }

        // 명단 표 그리기 함수
        function filterMembers(gender) {
            const tableContainer = document.getElementById('tableContainer');
            if (allMembers.length === 0) return;
            
            tableContainer.style.display = 'block';
            window.scrollTo({ top: tableContainer.offsetTop, behavior: 'smooth' });

            let filteredData = allMembers;
            let title = '전체 회원 명단';

            if (gender === '남' || gender === '여') {
                filteredData = allMembers.filter(m => m.gender === gender || m['성별'] === gender);
                title = `${gender}자 회원 명단`;
            }
            
            document.getElementById('tableTitle').textContent = title;
            document.getElementById('rowCount').textContent = `${filteredData.length}명`;

            if(filteredData.length === 0) {
                document.getElementById('memberData').innerHTML = '<tr><td colspan="10" style="text-align:center;">데이터가 없습니다.</td></tr>';
                return;
            }

            // 보여줄 항목의 순서를 지정 (원하는 항목만 추려서 보여줍니다)
            const allHeaders = Object.keys(filteredData[0]);
            
            document.getElementById('headerRow').innerHTML = allHeaders.map(h => 
                `<th>${translate[h] || h}</th>`
            ).join('');
            
            document.getElementById('memberData').innerHTML = filteredData.map(row => 
                `<tr>${allHeaders.map(h => {
                    let cellData = row[h] || '';
                    if (h === 'created_at' && cellData) {
                        cellData = new Date(cellData).toLocaleString('ko-KR', { 
                            year: 'numeric', month: '2-digit', day: '2-digit', 
                            hour: '2-digit', minute: '2-digit' 
                        });
                    }
                    return `<td>${cellData}</td>`;
                }).join('')}</tr>`
            ).join('');
        }

        window.onload = loadData;
    </script>
</body>
</html>
