<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>파인드썸 통합 관리자</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', -apple-system, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        
        /* 상단 대시보드 스타일 */
        .container { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); padding: 40px; max-width: 600px; width: 100%; position: relative; margin-bottom: 20px; }
        h1 { font-size: 24px; color: #1a1a2e; margin-bottom: 8px; text-align: center; }
        .subtitle { color: #666; font-size: 14px; text-align: center; margin-bottom: 20px; }
        .stats { text-align: center; font-size: 15px; color: #059669; font-weight: 700; margin-bottom: 24px; background: #ecfdf5; padding: 10px; border-radius: 8px; }
        
        /* 메뉴 버튼 스타일 */
        .menu { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .menu button { display: flex; align-items: center; gap: 12px; padding: 16px; border: 1px solid #e5e7eb; border-radius: 12px; background: white; cursor: pointer; text-align: left; transition: all 0.2s; }
        .menu button:hover { border-color: #7c3aed; background: #faf5ff; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(124,58,237,0.1); }
        .menu-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
        .menu-text h2 { font-size: 14px; font-weight: 600; color: #333; margin-bottom: 2px; }
        .menu-text p { font-size: 11px; color: #888; }
        
        .icon-all { background: #fef2f2; color: #dc2626; font-weight: 900; font-size: 12px; }
        .icon-woman { background: #fce7f3; }
        .icon-man { background: #dbeafe; }
        .icon-refresh { background: #ede9fe; }

        /* 하단 표 스타일 */
        .table-container { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); padding: 20px; max-width: 1000px; width: 100%; overflow-x: auto; display: none; }
        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .table-header h2 { font-size: 18px; color: #333; }
        table { width: 100%; border-collapse: collapse; white-space: nowrap; font-size: 13px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #f8fafc; color: #475569; font-weight: 600; }
        tr:hover { background: #f1f5f9; }
        
        .loading { text-align: center; font-size: 16px; color: #7c3aed; font-weight: bold; margin: 20px 0; display: none; }

        @media (max-width: 600px) {
            .menu { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- 대시보드 영역 -->
    <div class="container">
        <h1>대구/경북 파인드썸 관리</h1>
        <p class="subtitle">1:1 소개팅 회원 통합 관리 시스템</p>
        
        <div class="stats" id="monthlyStats">통계 불러오는 중...</div>
        <div class="loading" id="loadingIndicator">데이터를 불러오고 있습니다... ⏳</div>

        <div class="menu">
            <button onclick="filterMembers('all')">
                <div class="menu-icon icon-all">ALL</div>
                <div class="menu-text">
                    <h2>전체 회원 보기</h2>
                    <p>접수된 모든 회원 명단 조회</p>
                </div>
            </button>
            <button onclick="filterMembers('여')">
                <div class="menu-icon icon-woman">&#9792;</div>
                <div class="menu-text">
                    <h2>여자 회원 모아보기</h2>
                    <p>여자 회원 명단만 필터링</p>
                </div>
            </button>
            <button onclick="filterMembers('남')">
                <div class="menu-icon icon-man">&#9794;</div>
                <div class="menu-text">
                    <h2>남자 회원 모아보기</h2>
                    <p>남자 회원 명단만 필터링</p>
                </div>
            </button>
            <button onclick="loadData()">
                <div class="menu-icon icon-refresh">&#128260;</div>
                <div class="menu-text">
                    <h2>최신 데이터 새로고침</h2>
                    <p>구글 시트에서 최신 정보 가져오기</p>
                </div>
            </button>
        </div>
    </div>

    <!-- 데이터 표 영역 -->
    <div class="table-container" id="tableContainer">
        <div class="table-header">
            <h2 id="tableTitle">전체 회원 명단</h2>
            <span style="font-size:12px; color:#888;" id="rowCount">0명</span>
        </div>
        <table>
            <thead><tr id="headerRow"></tr></thead>
            <tbody id="memberData"></tbody>
        </table>
    </div>

    <script>
        // 🚨 [매우 중요] 아래 따옴표 안에 본인의 웹 앱 URL을 다시 꼭 넣어주세요!
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwyoYa6C1C9MBeBs3FpBhxUKxmm7TxZ_JZUFwP9idODkEdQwzZYhScnca5prwmDKH0H/exec';
        
        let allMembers = [];

        // 💡 한글 번역 사전 (엑셀의 영어를 화면에서만 한글로 바꿔줍니다)
        const translate = {
            "Timestamp": "접수일시", "name": "이름", "gender": "성별", "nickname": "닉네임",
            "birthYear": "출생연도", "phoneNumber": "연락처", "region": "거주지역",
            "job": "직업", "jobCategory": "직군", "jobOrganizationName": "직장명",
            "height": "키", "doubleEyelid": "쌍꺼풀", "bodyType": "체형",
            "personality": "성격", "mbti": "MBTI", "hobby": "취미",
            "smoking": "흡연여부", "drinking": "음주여부", "religion": "종교",
            "idealType": "이상형", "importantCriteria": "중요조건", "preferredAgeRange": "선호연령",
            "preferredHeightMin": "선호키(최소)", "avoidReligion": "기피종교", "avoidType": "기피유형",
            "selfIntroduction": "자기소개", "continueMatchingYn": "추가매칭여부"
        };

        // 데이터 불러오기 함수
        async function loadData() {
            document.getElementById('loadingIndicator').style.display = 'block';
            
            try {
                const response = await fetch(scriptURL);
                allMembers = await response.json();
                
                const currentMonth = new Date().toISOString().substring(0, 7);
                const thisMonthCount = allMembers.filter(m => String(m['Timestamp']).startsWith(currentMonth)).length;
                
                document.getElementById('monthlyStats').innerHTML = 
                    `총 누적 회원 : ${allMembers.length}명 <br> 이번 달 신규 지원 : ${thisMonthCount}명`;
                
                filterMembers('all');
            } catch (error) {
                alert('데이터를 불러오는 중 오류가 발생했습니다.');
                console.error(error);
            } finally {
                document.getElementById('loadingIndicator').style.display = 'none';
            }
        }

        // 남/여 필터링 및 표 그리기 함수
        function filterMembers(gender) {
            const tableContainer = document.getElementById('tableContainer');
            if (allMembers.length === 0) return;
            
            tableContainer.style.display = 'block';

            let filteredData = allMembers;
            let title = '전체 회원 명단';

            if (gender === '남' || gender === '여') {
                filteredData = allMembers.filter(m => m['gender'] === gender || m['성별'] === gender);
                title = `${gender}자 회원 명단`;
            }
            
            document.getElementById('tableTitle').textContent = title;
            document.getElementById('rowCount').textContent = `${filteredData.length}명`;

            const allHeaders = Object.keys(allMembers[0]);
            
            // 표 헤더(항목명) 그리기 - 사전에 있으면 한글로, 없으면 원래 영어로
            document.getElementById('headerRow').innerHTML = allHeaders.map(h => 
                `<th>${translate[h] || h}</th>`
            ).join('');
            
            // 표 내용 그리기 (최신순)
            document.getElementById('memberData').innerHTML = filteredData.reverse().map(row => 
                `<tr>${allHeaders.map(h => {
                    let cellData = row[h] || '';
                    if (h === 'Timestamp' && cellData) {
                        // 날짜를 보기 좋게 YYYY-MM-DD HH:MM 형식으로 자르기
                        cellData = String(cellData).substring(0, 16).replace('T', ' ');
                    }
                    return `<td>${cellData}</td>`;
                }).join('')}</tr>`
            ).join('');
        }

        window.onload = loadData;
    </script>
</body>
</html>
